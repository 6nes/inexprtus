<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비주얼 노벨 스튜디오</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f1;
    --surface: #ffffff;
    --surface-2: #f9f8f6;
    --border: rgba(0,0,0,0.08);
    --border-mid: rgba(0,0,0,0.13);
    --text: #1a1917;
    --text-2: #5a5855;
    --text-3: #9a9895;
    --accent: #e8450a;
    --accent-bg: #fef1ec;
    --accent-hover: #c93908;
    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 14px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 4px 16px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.1), 0 3px 10px rgba(0,0,0,0.05);
    --transition: 180ms ease;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ─── 홈 화면 ─────────────────────────────── */
  #home-screen {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow-y: auto;
  }

  .home-nav {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(245,244,241,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .home-logo {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .home-logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
  }

  .home-body {
    padding: 40px 32px;
    flex: 1;
  }

  .home-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .home-section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-3);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .story-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .story-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: var(--transition);
    transition-property: transform, box-shadow, border-color;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .story-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow);
    border-color: var(--border-mid);
  }

  .story-cover {
    width: 100%;
    aspect-ratio: 16/9;
    background-size: cover;
    background-position: center;
    background-color: #e8e6e2;
    position: relative;
  }

  .story-cover-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.5) 100%);
  }

  .story-cover-count {
    position: absolute;
    bottom: 8px;
    left: 10px;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.3px;
  }

  .card-delete-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 26px; height: 26px;
    background: rgba(0,0,0,0.55);
    color: white;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity var(--transition), background var(--transition);
    z-index: 5;
  }

  .story-card:hover .card-delete-btn { opacity: 1; }
  .card-delete-btn:hover { background: rgba(220,50,30,0.8); }

  .story-details {
    padding: 12px 14px 14px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .story-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .story-actions {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-top: auto;
  }

  .card-btn {
    width: 100%;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background var(--transition), transform var(--transition);
    text-align: center;
  }

  .card-btn:active { transform: scale(0.98); }

  .btn-play { background: var(--accent); color: white; }
  .btn-play:hover { background: var(--accent-hover); }

  .btn-link { background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border); }
  .btn-link:hover { background: #ece9e4; border-color: var(--border-mid); }

  .btn-edit { background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border); }
  .btn-edit:hover { background: #ece9e4; border-color: var(--border-mid); }

  /* 빈 상태 */
  .empty-state {
    grid-column: 1/-1;
    padding: 60px 32px;
    text-align: center;
    color: var(--text-3);
  }

  .empty-state-icon {
    font-size: 40px;
    display: block;
    margin-bottom: 12px;
  }

  .empty-state h3 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-2);
    margin-bottom: 6px;
  }

  .empty-state p {
    font-size: 13px;
    margin-bottom: 20px;
  }

  /* ─── 공통 버튼 ─────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 7px 14px;
    font-weight: 600;
    border-radius: var(--radius-sm);
    cursor: pointer;
    border: 1px solid transparent;
    transition: background var(--transition), border-color var(--transition), transform var(--transition);
    font-size: 12px;
    white-space: nowrap;
    line-height: 1;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

  .btn-ghost { background: transparent; color: var(--text-2); border-color: var(--border-mid); }
  .btn-ghost:hover { background: var(--surface-2); }

  .btn-new-story {
    padding: 8px 18px;
    font-size: 13px;
    border-radius: var(--radius);
  }

  /* ─── 워크스페이스 ─────────────────────────── */
  #workspace-screen {
    display: none;
    height: 100vh;
    width: 100vw;
  }

  #left-panel {
    width: 42%;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100%;
    flex-shrink: 0;
  }

  .workspace-nav {
    padding: 0 16px;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .workspace-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* 탭 */
  .tab-bar {
    display: flex;
    padding: 10px 14px 0;
    gap: 2px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .tab-btn {
    padding: 7px 12px 9px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-3);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: color var(--transition), border-color var(--transition);
    white-space: nowrap;
    margin-bottom: -1px;
  }

  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text-2); }

  /* 스크롤 영역 */
  .panel-scroll {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  /* 섹션 */
  .section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
  }

  /* 입력 요소 */
  .field { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .field label { font-size: 11px; font-weight: 600; color: var(--text-2); }

  .field input,
  .field select,
  .field textarea {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 9px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-family: inherit;
    transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
    width: 100%;
  }

  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--surface);
    box-shadow: 0 0 0 3px rgba(232,69,10,0.1);
  }

  .field input[type="file"] {
    padding: 5px 9px;
    cursor: pointer;
  }

  .field input[type="color"] {
    padding: 2px 3px;
    height: 34px;
    cursor: pointer;
  }

  .field textarea { resize: vertical; }

  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  .row:last-child { margin-bottom: 0; }

  /* 캐릭터 태그 */
  .char-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .char-tag {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--surface-2);
    color: var(--text-2);
    transition: all var(--transition);
  }

  .char-tag:hover { border-color: var(--border-mid); background: #ece9e4; }
  .char-tag.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
  .char-tag.narration { font-style: italic; }

  /* 슬롯 배치 */
  .slot-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

  .slot-item { display: flex; flex-direction: column; gap: 4px; }
  .slot-label { font-size: 10px; font-weight: 700; color: var(--text-3); text-align: center; }

  .slot-item select {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 8px;
    border-radius: var(--radius-sm);
    font-size: 11px;
    font-family: inherit;
    width: 100%;
    text-align: center;
    cursor: pointer;
    transition: border-color var(--transition), box-shadow var(--transition);
  }

  .slot-item select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,69,10,0.1); }

  /* 저장 버튼 */
  .save-btn {
    width: 100%;
    padding: 10px;
    font-size: 13px;
    font-weight: 700;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background var(--transition), transform var(--transition);
    margin-top: 4px;
  }

  .save-btn:hover { background: var(--accent-hover); }
  .save-btn:active { transform: scale(0.98); }

  /* 피팅 도구 박스 */
  .fitting-box {
    background: #fffbf5;
    border: 1px dashed #fcd280;
    border-radius: var(--radius);
    padding: 12px 14px;
    margin: 12px 0 0;
  }

  .fitting-box .section-label { color: #b45309; margin-bottom: 8px; }
  .fitting-box small { color: #d97706; font-size: 11px; display: block; margin-top: 6px; }

  /* 슬라이드 타임라인 */
  .timeline {
    flex: 1;
    padding: 12px 14px;
    overflow-y: auto;
    background: var(--surface-2);
  }

  .timeline-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 8px;
  }

  .scene-list { display: flex; flex-direction: column; gap: 4px; }

  .scene-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    cursor: grab;
    display: flex;
    gap: 8px;
    align-items: center;
    transition: border-color var(--transition), box-shadow var(--transition);
    position: relative;
  }

  .scene-card:hover { border-color: var(--border-mid); }
  .scene-card.active { border-color: var(--accent); background: var(--accent-bg); box-shadow: 0 0 0 2px rgba(232,69,10,0.08); }

  .scene-num {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-3);
    min-width: 20px;
    text-align: right;
  }

  .scene-info { flex: 1; min-width: 0; }
  .scene-speaker { font-size: 11px; font-weight: 700; margin-bottom: 1px; }
  .scene-text { font-size: 11px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .scene-delete {
    background: none;
    border: none;
    color: var(--text-3);
    cursor: pointer;
    font-size: 12px;
    padding: 2px 4px;
    border-radius: 4px;
    flex-shrink: 0;
    transition: color var(--transition), background var(--transition);
  }

  .scene-delete:hover { color: var(--accent); background: var(--accent-bg); }

  /* ─── 프리뷰 / 플레이어 ──────────────────── */
  #preview-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background: var(--bg);
    position: relative;
  }

  .play-banner {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(26,25,23,0.9);
    color: white;
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    display: none;
    cursor: pointer;
    z-index: 20;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12);
    white-space: nowrap;
    transition: background var(--transition);
    letter-spacing: 0.2px;
  }

  .play-banner:hover { background: rgba(26,25,23,0.98); }

  #game-screen {
    width: 640px;
    height: 480px;
    background: #2a2826;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border-mid);
    position: relative;
    overflow: hidden;
    background-size: cover;
    background-position: center;
    transition: background-image 0.3s ease;
  }

  /* 배경 오버레이 (텍스트 가독성) */
  #game-screen::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 55%;
    background: linear-gradient(transparent, rgba(0,0,0,0.3));
    pointer-events: none;
    z-index: 1;
  }

  /* 스탠딩 이미지 */
  .standing-slot {
    position: absolute;
    bottom: 90px;
    height: 310px;
    transition: all 0.25s ease;
    display: none;
    transform: translateX(-50%);
    object-fit: contain;
    z-index: 2;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.4));
  }

  #standing-left { left: 22%; }
  #standing-center { left: 50%; }
  #standing-right { left: 78%; }

  @keyframes jumpEffect {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    35% { transform: translateX(-50%) translateY(-28px); }
  }

  .effect-jump { animation: jumpEffect 0.45s ease 2; }

  /* 텍스트박스 */
  #textbox {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 93%;
    min-height: 110px;
    background: rgba(255, 255, 255, 0.97);
    border: 1px solid rgba(255,255,255,0.8);
    border-radius: 10px;
    padding: 13px 18px 16px;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    z-index: 10;
    backdrop-filter: blur(6px);
    box-shadow: 0 -2px 20px rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.08);
  }

  #name-tag {
    font-size: 13px;
    font-weight: 800;
    margin-bottom: 5px;
    color: var(--accent);
    letter-spacing: 0.2px;
  }

  #text-content {
    font-size: 14px;
    line-height: 1.6;
    color: #1a1917;
    font-weight: 450;
  }

  #click-hint {
    position: absolute;
    bottom: 9px;
    right: 14px;
    font-size: 9px;
    font-weight: 700;
    color: rgba(0,0,0,0.3);
    letter-spacing: 1px;
    text-transform: uppercase;
    animation: blink 1.2s infinite;
    display: none;
  }

  @keyframes blink { 50% { opacity: 0; } }

  /* 텍스트 효과 */
  .text-yell {
    font-size: 18px !important;
    font-weight: 900 !important;
    color: #c93908 !important;
    letter-spacing: -0.3px;
  }

  .text-whisper {
    font-size: 12.5px !important;
    color: #8a8785 !important;
    font-style: italic;
    letter-spacing: 0.3px;
  }

  /* 나레이션 */
  .narration-box {
    background: rgba(20, 18, 16, 0.88) !important;
    border-color: rgba(255,255,255,0.08) !important;
  }

  .narration-box #name-tag { display: none !important; }

  .narration-box #text-content {
    color: rgba(255,255,255,0.92) !important;
    font-size: 14px !important;
    text-align: center;
    font-style: italic;
    padding-top: 12px;
    line-height: 1.7;
  }

  .narration-box #click-hint { color: rgba(255,255,255,0.25) !important; }

  /* 전체화면 */
  .fullscreen-active {
    position: fixed !important;
    top: 0 !important; left: 0 !important;
    width: 100vw !important; height: 100vh !important;
    z-index: 9999 !important;
    background: black !important;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
  }

  .fullscreen-active #game-screen {
    width: 100vw !important; height: 100vh !important;
    border-radius: 0 !important;
    border: none !important;
    box-shadow: none !important;
  }

  .fullscreen-active .standing-slot {
    height: 62vh !important;
    bottom: 20vh !important;
  }

  .fullscreen-active #textbox {
    bottom: 3.5vh !important;
    width: 82% !important;
    padding: 22px 32px 26px !important;
  }

  .fullscreen-active #name-tag { font-size: 20px !important; }
  .fullscreen-active #text-content { font-size: 18px !important; }
  .fullscreen-active .narration-box #text-content { font-size: 19px !important; }

  /* ─── 스크롤바 ─────────────────────────────── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

  /* ─── 드래그 핸들 ─────────────────────────── */
  .drag-handle {
    cursor: grab;
    color: var(--text-3);
    font-size: 11px;
    padding: 0 2px;
  }

  /* ─── 정보 뱃지 ────────────────────────────── */
  .info-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 8px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-3);
  }
</style>
</head>
<body>

<div id="home-screen">
  <nav class="home-nav">
    <div class="home-logo">
      <span class="home-logo-dot"></span>
      비주얼 노벨 스튜디오
    </div>
    <button class="btn btn-primary btn-new-story" onclick="createNewStoryPrompt()">
      + 새 스토리
    </button>
    
    <!-- 📥 여기에 복사한 HTML 코드를 쏙 넣어주세요! -->
    <button class="btn btn-secondary" onclick="document.getElementById('json-file-input').click()" style="margin-left: 8px;">📂 JSON 파일 불러오기</button>
    <input type="file" id="json-file-input" accept=".json" style="display: none;" onchange="importJSONBackup(event)">
    
  </nav>

  <div class="home-body">
    <div class="home-section-header">
      <span class="home-section-title">내 스토리</span>
    </div>
    <div id="story-grid" class="story-grid"></div>
  </div>
</div>

<div id="workspace-screen" style="display:flex; height:100vh;">

  <div id="left-panel">
    <div class="workspace-nav">
      <button class="btn btn-ghost" onclick="goHome()">← 홈</button>
      <span class="workspace-title" id="current-story-title-display">스토리 제목</span>
      <button class="btn btn-primary" onclick="togglePlayMode(false)">▶ 테스트</button>
    </div>

    <div class="tab-bar">
      <button id="tab-write-btn" class="tab-btn active" onclick="switchTab('write')">✍️ 대사 & 연출</button>
      <button id="tab-setup-btn" class="tab-btn" onclick="switchTab('setup')">👥 자캐 & 비주얼</button>
    </div>

    <div class="panel-scroll">
      <div id="tab-write">
        <div class="section">
          <div class="section-label">발화 자캐 선택</div>
          <div id="char-tags" class="char-tags"></div>
        </div>

        <div class="section">
          <div class="section-label">배경 & 효과</div>
          <div class="row">
            <div class="field">
              <label>배경 이미지 URL</label>
              <input type="text" id="bg-input" value="https://picsum.photos/640/480?random=1" placeholder="https://..." oninput="updatePreviewLive()">
            </div>
          </div>
          <div class="row">
            <div class="field">
              <label>글씨 효과</label>
              <select id="text-effect-input" onchange="updatePreviewLive()">
                <option value="normal">일반</option>
                <option value="yell">⚡ 소리지르기!</option>
                <option value="whisper">🤫 귓속말...</option>
              </select>
            </div>
            <div class="field">
              <label>모션 타겟</label>
              <select id="char-effect-input" onchange="updatePreviewLive()">
                <option value="none">없음</option>
                <option value="left">왼쪽 점프</option>
                <option value="center">가운데 점프</option>
                <option value="right">오른쪽 점프</option>
              </select>
            </div>
          </div>
          <div class="field" style="margin-bottom: 10px;">
            <label>대사 내용</label>
            <textarea id="text-input" rows="3" oninput="updatePreviewLive()" placeholder="대사를 입력하세요..."></textarea>
          </div>
          <button class="save-btn" onclick="addOrUpdateScene()">슬라이드 저장</button>
        </div>
      </div>

      <div id="tab-setup" style="display:none;">
        <div class="section">
          <div class="section-label">화면 배치 (좌 / 중 / 우)</div>
          <div class="slot-grid">
            <div class="slot-item">
              <div class="slot-label">⬅ 왼쪽</div>
              <select id="slot-left-select" onchange="updatePreviewLive()"><option value="">비어있음</option></select>
            </div>
            <div class="slot-item">
              <div class="slot-label">⬆ 가운데</div>
              <select id="slot-center-select" onchange="updatePreviewLive()"><option value="">비어있음</option></select>
            </div>
            <div class="slot-item">
              <div class="slot-label">➡ 오른쪽</div>
              <select id="slot-right-select" onchange="updatePreviewLive()"><option value="">비어있음</option></select>
            </div>
          </div>

          <div class="fitting-box">
            <div class="section-label">📏 크기 & 위치 맞춤</div>
            <div class="row">
              <div class="field">
                <label>이미지 높이 (px)</label>
                <input type="number" id="char-height-input" value="310" min="100" max="800" step="10" oninput="updatePreviewLive()">
              </div>
              <div class="field">
                <label>바닥 여백 (px)</label>
                <input type="number" id="char-bottom-input" value="90" min="0" max="400" step="10" oninput="updatePreviewLive()">
              </div>
            </div>
            <small>저장 시 캐릭터 설정에 고정됩니다.</small>
          </div>
        </div>

        <div class="section">
          <div class="section-label">신규 자캐 등록</div>
          <div class="row">
            <div class="field" style="flex: 0.6;">
              <label>이름</label>
              <input type="text" id="char-name" placeholder="캐릭터 이름">
            </div>
            <div class="field" style="flex: 0.4;">
              <label>소속</label>
              <input type="text" id="char-club" placeholder="방송부, 학생회...">
            </div>
          </div>
          <div class="row">
            <div class="field" style="flex: 0 0 50px;">
              <label>색상</label>
              <input type="color" id="char-color" value="#e8450a">
            </div>
            <div class="field">
              <label>스탠딩 이미지 파일</label>
              <input type="file" id="char-file-input" accept="image/*">
            </div>
          </div>
          <button class="save-btn" onclick="saveCharacterProfile()">자캐 등록</button>
        </div>
      </div>

      <div class="timeline">
        <div class="timeline-label">슬라이드 순서 — 드래그로 이동</div>
        <div id="scene-list" class="scene-list"></div>
      </div>
    </div>
  </div>

  <div id="preview-container">
    <div class="play-banner" id="play-mode-banner" onclick="exitPlayMode()">⏸ 플레이 모드 종료 (클릭)</div>
    <div id="game-screen">
      <img id="standing-left" class="standing-slot" src="" alt="">
      <img id="standing-center" class="standing-slot" src="" alt="">
      <img id="standing-right" class="standing-slot" src="" alt="">
      <div id="textbox" onclick="handleScreenClick()">
        <div id="name-tag">이름</div>
        <div id="text-content">대사 내용</div>
        <div id="click-hint">CLICK ▶</div>
      </div>
    </div>
  </div>
</div>

<script>
/* ── 🛰️ 수파베이스 연동 설정 (이름 충돌 해결 버전) ── */
  const SUPABASE_URL = "https://xyacthmcxeryziymouvk.supabase.co";
  const SUPABASE_KEY = "sb_publishable_HsOaCpbpbopn8ErCs6aB-Q_lr4OKj1x";
  
  // ⭐️ 변수 이름을 'supabase' 대신 'client'로 바꿨어!
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  /* ── 기본 데이터 구조 ── */
  let stories = {};
  let characters = {};
  let currentStoryTitle = "";
  let scenes = [];
  let selectedCharId = null;
  let selectedIndex = 0;
  let isPlayMode = false;
  let isFullPlayerMode = false;
  let playIndex = 0;
  let typingTimer;

  /* ── 서버로부터 초기 데이터 로드 ── */
  window.onload = async function () {
    await loadCharactersFromSupabase();
    await loadStoriesFromSupabase();

    renderStoryGrid();
    renderCharacterTags();
    updateSlotSelectors();
    initSortable();

    const urlParams = new URLSearchParams(window.location.search);
    const storyParam = urlParams.get('story');
    if (storyParam && stories[storyParam]) {
      setTimeout(() => { playStoryFullscreen(storyParam); }, 300);
    }
  };

  async function loadCharactersFromSupabase() {
    const { data, error } = await client.from('characters').select('*');
    if (!error && data) {
      characters = {};
      data.forEach(c => {
        characters[c.id] = {
          name: c.name, club: c.club, color: c.color, img: c.img,
          customHeight: c.custom_height, customBottom: c.custom_bottom
        };
      });
    }
  }

  async function loadStoriesFromSupabase() {
    const { data, error } = await client.from('stories').select('*');
    if (!error && data) {
      stories = {};
      data.forEach(s => { stories[s.title] = s.scenes; });
    }
  }

  /* ── 홈 화면 컨트롤 ── */
  function renderStoryGrid() {
    const grid = document.getElementById('story-grid');
    grid.innerHTML = '';

    const keys = Object.keys(stories);
    if (keys.length === 0) {
      grid.innerHTML = `<div class="empty-state">
        <span class="empty-state-icon">📖</span>
        <h3>아직 스토리가 없어요</h3>
        <p>첫 번째 스토리를 만들어 보세요!</p>
        <button class="btn btn-primary" onclick="createNewStoryPrompt()" style="margin: 0 auto; display: inline-flex;">+ 새 스토리 만들기</button>
      </div>`;
      return;
    }

    keys.forEach(title => {
      const storyScenes = stories[title];
      const coverImg = storyScenes[0]?.bg || "https://picsum.photos/640/480?random=10";
      const card = document.createElement('div');
      card.className = 'story-card';
      card.innerHTML = `
        <button class="card-delete-btn" onclick="deleteStory('${title}', event)" title="삭제">✕</button>
        <div class="story-cover" style="background-image:url('${coverImg}')">
          <div class="story-cover-overlay"></div>
          <span class="story-cover-count">${storyScenes.length}장</span>
        </div>
        <div class="story-details">
          <div class="story-title" title="${title}">${title}</div>
          <div class="story-actions">
            <button class="card-btn btn-play" onclick="playStoryFullscreen('${title}')">▶ 영화관 플레이</button>
            <button class="card-btn btn-link" onclick="copyStoryLink('${title}')">🔗 링크 복사</button>
            <button class="card-btn btn-edit" onclick="openStoryEditor('${title}')">✏️ 수정</button>
          </div>
        </div>`;
      grid.appendChild(card);
    });
  }

  async function createNewStoryPrompt() {
    const title = prompt("새 스토리 제목을 입력하세요:");
    if (!title || !title.trim()) return;
    if (stories[title]) { alert("이미 같은 제목의 스토리가 있어요."); return; }
    
    const initialScene = [{
      bg: "https://picsum.photos/640/480?random=" + Math.floor(Math.random() * 100),
      charId: "narration", name: "나레이션",
      text: "여기에 첫 대사나 분위기를 적어보세요.",
      textEffect: "normal", charEffect: "none",
      slots: { left:"", center:"", right:"" }
    }];

    await client.from('stories').upsert({ title: title, scenes: initialScene });
    stories[title] = initialScene;
    renderStoryGrid();
  }

  async function deleteStory(title, event) {
    event.stopPropagation();
    if (!confirm(`"${title}"을 삭제할까요? 클라우드에서도 함께 삭제됩니다.`)) return;
    await client.from('stories').delete().eq('title', title);
    delete stories[title];
    renderStoryGrid();
  }

  function copyStoryLink(title) {
    const url = `${window.location.origin}${window.location.pathname}?story=${encodeURIComponent(title)}`;
    navigator.clipboard.writeText(url)
      .then(() => alert(`"${title}" 플레이 링크가 복사되었습니다!`))
      .catch(() => prompt("직접 복사하세요:", url));
  }

  function playStoryFullscreen(title) {
    currentStoryTitle = title;
    scenes = stories[title];
    document.getElementById('home-screen').style.display = 'none';
    document.getElementById('workspace-screen').style.display = 'flex';
    document.getElementById('preview-container').classList.add('fullscreen-active');
    isFullPlayerMode = true;
    togglePlayMode(true);
  }

  function goHome() {
    window.history.replaceState({}, document.title, window.location.pathname);
    exitPlayMode();
    isFullPlayerMode = false;
    document.getElementById('workspace-screen').style.display = 'none';
    document.getElementById('home-screen').style.display = 'flex';
    renderStoryGrid();
  }

  function openStoryEditor(title) {
    currentStoryTitle = title;
    scenes = stories[title];
    document.getElementById('current-story-title-display').innerText = title;
    document.getElementById('home-screen').style.display = 'none';
    document.getElementById('workspace-screen').style.display = 'flex';
    switchTab('write');
    renderSceneList();
    selectScene(0);
  }

  function switchTab(tabId) {
    document.getElementById('tab-write-btn').className = 'tab-btn' + (tabId === 'write' ? ' active' : '');
    document.getElementById('tab-setup-btn').className = 'tab-btn' + (tabId === 'setup' ? ' active' : '');
    document.getElementById('tab-write').style.display = tabId === 'write' ? 'block' : 'none';
    document.getElementById('tab-setup').style.display = tabId === 'setup' ? 'block' : 'none';
  }

  /* ── 자캐 프로필 처리 ── */
  function saveCharacterProfile() {
    const name = document.getElementById('char-name').value.trim();
    const club = document.getElementById('char-club').value.trim();
    const color = document.getElementById('char-color').value;
    const fileInput = document.getElementById('char-file-input');
    const customHeight = parseInt(document.getElementById('char-height-input').value) || 310;
    const customBottom = parseInt(document.getElementById('char-bottom-input').value) || 90;
    if (!name) { alert("캐릭터 이름을 입력해 주세요."); return; }

    if (fileInput.files && fileInput.files[0]) {
      const reader = new FileReader();
      reader.onload = e => execReg(name, club, color, e.target.result, customHeight, customBottom);
      reader.readAsDataURL(fileInput.files[0]);
    } else {
      execReg(name, club, color, "https://images.vrml.kro.kr/character_sample.png", customHeight, customBottom);
    }
  }

  async function execReg(name, club, color, img, h, b) {
    const { error } = await client.from('characters').upsert({
      id: name, name, club, color, img, custom_height: h, custom_bottom: b
    });

    if (error) {
      alert("서버 자캐 등록 실패: " + error.message);
      return;
    }

    characters[name] = { name, club, color, img, customHeight: h, customBottom: b };
    renderCharacterTags();
    updateSlotSelectors();
    document.getElementById('char-name').value = '';
    document.getElementById('char-club').value = '';
    document.getElementById('char-file-input').value = '';
    alert(`${club ? `[${club}] ` : ''}${name} 클라우드 동기화 완료!`);
  }

  function renderCharacterTags() {
    const container = document.getElementById('char-tags');
    container.innerHTML = '';
    const narTag = document.createElement('div');
    narTag.className = 'char-tag narration' + (selectedCharId === 'narration' ? ' active' : '');
    narTag.innerText = '나레이션';
    narTag.onclick = () => { selectedCharId = selectedCharId === 'narration' ? null : 'narration'; renderCharacterTags(); updatePreviewLive(); };
    container.appendChild(narTag);

    Object.keys(characters).forEach(id => {
      const c = characters[id];
      const tag = document.createElement('div');
      tag.className = 'char-tag' + (selectedCharId === id ? ' active' : '');
      tag.style.color = selectedCharId === id ? c.color : '';
      if (selectedCharId === id) tag.style.borderColor = c.color;
      tag.innerText = c.club ? `[${c.club}] ${c.name}` : c.name;
      tag.onclick = () => { selectedCharId = selectedCharId === id ? null : id; renderCharacterTags(); updatePreviewLive(); };
      container.appendChild(tag);
    });
  }

  function updateSlotSelectors() {
    ['left','center','right'].forEach(pos => {
      const sel = document.getElementById(`slot-${pos}-select`);
      const prev = sel.value;
      sel.innerHTML = '<option value="">비어있음</option>';
      Object.keys(characters).forEach(n => {
        const opt = document.createElement('option');
        opt.value = n; opt.innerText = n;
        sel.appendChild(opt);
      });
      sel.value = prev;
    });
  }

  /* ── 슬라이드 연출 제어 ── */
  function initSortable() {
    Sortable.create(document.getElementById('scene-list'), {
      animation: 120,
      handle: '.drag-handle',
      onEnd: async evt => {
        const item = scenes.splice(evt.oldIndex, 1)[0];
        scenes.splice(evt.newIndex, 0, item);
        await saveAllToStorage();
        renderSceneList();
        selectScene(evt.newIndex);
      }
    });
  }

  function renderSceneList() {
    const list = document.getElementById('scene-list');
    list.innerHTML = '';
    scenes.forEach((scene, i) => {
      const card = document.createElement('div');
      card.className = 'scene-card' + (i === selectedIndex ? ' active' : '');
      card.onclick = () => selectScene(i);

      let color = '#9a9895';
      if (scene.charId && scene.charId !== 'narration') color = characters[scene.charId]?.color || '#e8450a';

      card.innerHTML = `
        <span class="drag-handle" title="드래그">⠿</span>
        <div class="scene-num">${i + 1}</div>
        <div class="scene-info">
          <div class="scene-speaker" style="color:${color}">${scene.name || '나레이션'}</div>
          <div class="scene-text">${scene.text || '내용 없음'}</div>
        </div>
        <button class="scene-delete" onclick="deleteScene(${i}, event)" title="삭제">✕</button>`;
      list.appendChild(card);
    });
  }

  function selectScene(index) {
    if (isPlayMode || !scenes[index]) return;
    selectedIndex = index;
    document.querySelectorAll('.scene-card').forEach((c, i) =>
      c.className = 'scene-card' + (i === index ? ' active' : ''));
    const s = scenes[index];
    document.getElementById('bg-input').value = s.bg;
    document.getElementById('text-input').value = s.text;
    document.getElementById('text-effect-input').value = s.textEffect || 'normal';
    document.getElementById('char-effect-input').value = s.charEffect || 'none';
    document.getElementById('slot-left-select').value = s.slots?.left || '';
    document.getElementById('slot-center-select').value = s.slots?.center || '';
    document.getElementById('slot-right-select').value = s.slots?.right || '';
    selectedCharId = s.charId || null;
    renderCharacterTags();
    drawScene(s, false);
  }

  async function addOrUpdateScene() {
    let name = '나레이션';
    if (selectedCharId && selectedCharId !== 'narration' && characters[selectedCharId]) {
      const c = characters[selectedCharId];
      name = c.club ? `[${c.club}] ${c.name}` : c.name;
    }
    const slots = {
      left: document.getElementById('slot-left-select').value,
      center: document.getElementById('slot-center-select').value,
      right: document.getElementById('slot-right-select').value
    };
    const newScene = {
      bg: document.getElementById('bg-input').value,
      charId: selectedCharId, name,
      text: document.getElementById('text-input').value,
      textEffect: document.getElementById('text-effect-input').value,
      charEffect: document.getElementById('char-effect-input').value,
      slots
    };
    if (scenes[selectedIndex]) { scenes[selectedIndex] = newScene; } else { scenes.push(newScene); }
    if (selectedIndex === scenes.length - 1) {
      scenes.push({ bg: newScene.bg, charId: selectedCharId, name, text: "다음 내용을 입력하세요.", textEffect:"normal", charEffect:"none", slots });
      selectedIndex = scenes.length - 1;
    }
    await saveAllToStorage();
    renderSceneList();
    selectScene(selectedIndex);
  }

  async function deleteScene(index, event) {
    event.stopPropagation();
    if (scenes.length <= 1) return;
    scenes.splice(index, 1);
    selectedIndex = Math.max(0, index - 1);
    await saveAllToStorage();
    renderSceneList();
    selectScene(selectedIndex);
  }

  async function saveAllToStorage() {
    if (currentStoryTitle) {
      stories[currentStoryTitle] = scenes;
      await client.from('stories').upsert({ title: currentStoryTitle, scenes: scenes });
    }
  }

  function updatePreviewLive() {
    if (isPlayMode) return;
    let name = '나레이션';
    if (selectedCharId && selectedCharId !== 'narration' && characters[selectedCharId]) {
      const c = characters[selectedCharId];
      name = c.club ? `[${c.club}] ${c.name}` : c.name;
    }
    drawScene({
      bg: document.getElementById('bg-input').value,
      charId: selectedCharId, name,
      text: document.getElementById('text-input').value,
      textEffect: document.getElementById('text-effect-input').value,
      charEffect: document.getElementById('char-effect-input').value,
      slots: {
        left: document.getElementById('slot-left-select').value,
        center: document.getElementById('slot-center-select').value,
        right: document.getElementById('slot-right-select').value
      }
    }, false);
  }

  /* ── 비주얼 게임 렌더링 엔진 ── */
  function drawScene(scene, useTyping = false) {
    if (!scene) return;
    document.getElementById('game-screen').style.backgroundImage = `url('${scene.bg}')`;
    const box = document.getElementById('textbox');
    const nameTag = document.getElementById('name-tag');
    const textEl = document.getElementById('text-content');

    const isNarration = !scene.charId || scene.charId === 'narration';

    if (isNarration) {
      box.classList.add('narration-box');
      nameTag.style.display = 'none';
      ['left','center','right'].forEach(p => document.getElementById(`standing-${p}`).style.display = 'none');
    } else {
      box.classList.remove('narration-box');
      nameTag.style.display = 'block';
      nameTag.innerText = scene.name || '???';
      const activeChar = characters[scene.charId];
      nameTag.style.color = activeChar ? activeChar.color : 'var(--accent)';

      ['left','center','right'].forEach(pos => {
        const img = document.getElementById(`standing-${pos}`);
        img.className = 'standing-slot';
        const charName = scene.slots?.[pos];
        const charData = characters[charName];

        if (charData?.img) {
          img.src = charData.img;
          img.style.display = 'block';

          const factor = isFullPlayerMode ? 1.8 : 1;
          img.style.height = `${(charData.customHeight || 310) * factor}px`;
          img.style.bottom = `${(charData.customBottom || 90) * factor}px`;

          if (scene.charEffect === pos) {
            void img.offsetWidth;
            img.classList.add('effect-jump');
          }
        } else {
          img.style.display = 'none';
        }
      });
    }

    if (!isPlayMode && document.getElementById('tab-setup').style.display !== 'none') {
      const h = parseInt(document.getElementById('char-height-input').value) || 310;
      const b = parseInt(document.getElementById('char-bottom-input').value) || 90;
      ['left','center','right'].forEach(pos => {
        const img = document.getElementById(`standing-${pos}`);
        if (img.style.display === 'block') {
          img.style.height = `${h}px`;
          img.style.bottom = `${b}px`;
        }
      });
    }

    textEl.className = '';
    if (scene.textEffect === 'yell') textEl.classList.add('text-yell');
    if (scene.textEffect === 'whisper') textEl.classList.add('text-whisper');

    if (useTyping && scene.textEffect !== 'yell') {
      typeWriter(textEl, scene.text);
    } else {
      clearInterval(typingTimer);
      textEl.innerText = scene.text;
    }
  }

  function typeWriter(el, text, speed = 22) {
    el.innerHTML = '';
    let i = 0;
    clearInterval(typingTimer);
    typingTimer = setInterval(() => {
      if (i < text.length) { el.innerHTML += text.charAt(i); i++; }
      else clearInterval(typingTimer);
    }, speed);
  }

  /* ── 게임 진행 플레이 기능 ── */
  function togglePlayMode(fromHome = false) {
    if (!scenes.length) return;
    isPlayMode = true;
    playIndex = 0;
    document.getElementById('play-mode-banner').style.display = 'flex';
    document.getElementById('click-hint').style.display = 'block';
    if (!fromHome) document.getElementById('left-panel').style.opacity = '0.08';
    drawScene(scenes[playIndex], true);
  }

  function exitPlayMode() {
    isPlayMode = false;
    clearInterval(typingTimer);
    document.getElementById('play-mode-banner').style.display = 'none';
    document.getElementById('click-hint').style.display = 'none';
    document.getElementById('left-panel').style.opacity = '1';
    if (isFullPlayerMode) {
      document.getElementById('preview-container').classList.remove('fullscreen-active');
      isFullPlayerMode = false;
      goHome();
    } else {
      selectScene(selectedIndex);
    }
  }

  function handleScreenClick() {
    if (!isPlayMode) return;
    playIndex++;
    if (playIndex < scenes.length) {
      drawScene(scenes[playIndex], true);
    } else {
      alert('🎬 스토리가 끝났습니다!');
      exitPlayMode();
    }
  }

  /* ── 📥여기에 복사한 자바스크립트 코드를 통째로 붙여넣어 주세요! ── */
  async function importJSONBackup(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async function (e) {
      try {
        const importedData = JSON.parse(e.target.result);
        
        if (!importedData.stories && !importedData.characters && typeof importedData !== 'object') {
          alert("올바른 비주얼 노벨 백업 파일(JSON)이 아닙니다.");
          return;
        }

        if (!confirm("선택한 JSON 파일의 데이터를 클라우드(Supabase)에 업로드하시겠습니까? (기존에 동일한 이름이 있다면 덮어씁니다.)")) return;

        const targetStories = importedData.stories || importedData;
        for (const title in targetStories) {
          if (Array.isArray(targetStories[title])) {
            await client.from('stories').upsert({ title: title, scenes: targetStories[title] });
            stories[title] = targetStories[title];
          }
        }

        if (importedData.characters) {
          for (const id in importedData.characters) {
            const c = importedData.characters[id];
            await client.from('characters').upsert({
              id: id, name: c.name, club: c.club || '', color: c.color || '#e8450a', img: c.img,
              custom_height: c.customHeight || 310, custom_bottom: c.customBottom || 90
            });
            characters[id] = c;
          }
        }

        alert("🎉 컴퓨터에 있던 백업 데이터가 수파베이스 클라우드로 업로드 완료되었습니다!");
        renderStoryGrid();
        renderCharacterTags();
        updateSlotSelectors();

      } catch (err) {
        alert("파일을 읽는 중 오류가 발생했습니다: " + err.message);
      }
    };
    reader.readAsText(file);
    event.target.value = '';
  }

</script>
