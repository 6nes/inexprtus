<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비주얼 노벨 스튜디오</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f1; --surface: #ffffff; --surface-2: #f9f8f6;
    --border: rgba(0,0,0,0.08); --border-mid: rgba(0,0,0,0.13);
    --text: #1a1917; --text-2: #5a5855; --text-3: #9a9895;
    --accent: #e8450a; --accent-bg: #fef1ec; --accent-hover: #c93908;
    --radius-sm: 6px; --radius: 10px; --radius-lg: 14px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow: 0 4px 16px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.1), 0 3px 10px rgba(0,0,0,0.05);
    --transition: 180ms ease;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; font-size: 14px; line-height: 1.5; }

  /* HOME */
  #home-screen { display: flex; flex-direction: column; height: 100vh; overflow-y: auto; }
  .home-nav { position: sticky; top: 0; z-index: 10; background: rgba(245,244,241,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 32px; height: 60px; display: flex; align-items: center; gap: 10px; }
  .home-logo { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; margin-right: auto; }
  .home-logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; }
  .home-body { padding: 40px 32px; flex: 1; }
  .home-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .home-section-title { font-size: 13px; font-weight: 600; color: var(--text-3); letter-spacing: 0.5px; text-transform: uppercase; }

  /* FOLDER */
  .folder-group { margin-bottom: 28px; }
  .folder-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; cursor: pointer; user-select: none; }
  .folder-toggle { font-size: 10px; color: var(--text-3); transition: transform 0.2s; display: inline-block; }
  .folder-toggle.open { transform: rotate(90deg); }
  .folder-name { font-size: 12px; font-weight: 700; color: var(--text-2); letter-spacing: 0.4px; text-transform: uppercase; }
  .folder-count { font-size: 10px; color: var(--text-3); background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 1px 7px; }
  .folder-cards.collapsed { display: none; }

  /* STORY GRID */
  .story-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
  .story-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: var(--transition); transition-property: transform, box-shadow, border-color; display: flex; flex-direction: column; position: relative; }
  .story-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: var(--border-mid); }
  .story-cover { width: 100%; aspect-ratio: 16/9; background-size: cover; background-position: center; background-color: #e8e6e2; position: relative; }
  .story-cover-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.5) 100%); }
  .story-cover-count { position: absolute; bottom: 8px; left: 10px; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.9); letter-spacing: 0.3px; }
  .card-delete-btn { position: absolute; top: 8px; right: 8px; width: 26px; height: 26px; background: rgba(0,0,0,0.55); color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity var(--transition), background var(--transition); z-index: 5; }
  .card-folder-btn { position: absolute; top: 8px; left: 8px; width: 26px; height: 26px; background: rgba(0,0,0,0.45); color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity var(--transition), background var(--transition); z-index: 5; }
  .story-card:hover .card-delete-btn, .story-card:hover .card-folder-btn { opacity: 1; }
  .card-delete-btn:hover { background: rgba(220,50,30,0.8); }
  .card-folder-btn:hover { background: rgba(40,80,220,0.65); }
  .story-details { padding: 12px 14px 14px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .story-title { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .story-actions { display: flex; flex-direction: column; gap: 5px; margin-top: auto; }
  .card-btn { width: 100%; padding: 7px 10px; border-radius: var(--radius-sm); border: none; font-size: 12px; font-weight: 500; cursor: pointer; transition: background var(--transition), transform var(--transition); text-align: center; }
  .card-btn:active { transform: scale(0.98); }
  .btn-play { background: var(--accent); color: white; }
  .btn-play:hover { background: var(--accent-hover); }
  .btn-link { background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border); }
  .btn-link:hover { background: #ece9e4; }
  .btn-edit { background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border); }
  .btn-edit:hover { background: #ece9e4; }
  .empty-state { grid-column: 1/-1; padding: 60px 32px; text-align: center; color: var(--text-3); }
  .empty-state-icon { font-size: 40px; display: block; margin-bottom: 12px; }
  .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; margin-bottom: 20px; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; font-weight: 600; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid transparent; transition: background var(--transition), border-color var(--transition), transform var(--transition); font-size: 12px; white-space: nowrap; line-height: 1; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-ghost { background: transparent; color: var(--text-2); border-color: var(--border-mid); }
  .btn-ghost:hover { background: var(--surface-2); }
  .btn-new-story { padding: 8px 18px; font-size: 13px; border-radius: var(--radius); }

  /* WORKSPACE */
  #workspace-screen { display: none; height: 100vh; width: 100vw; }
  #left-panel { width: 44%; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; flex-shrink: 0; }
  .workspace-nav { padding: 0 16px; height: 54px; display: flex; align-items: center; justify-content: space-between; gap: 10px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .workspace-title { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tab-bar { display: flex; padding: 10px 14px 0; gap: 2px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab-btn { padding: 7px 12px 9px; font-size: 12px; font-weight: 600; color: var(--text-3); background: transparent; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: color var(--transition), border-color var(--transition); white-space: nowrap; margin-bottom: -1px; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text-2); }
  .panel-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .section { padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .section-label { font-size: 10px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
  .field { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .field label { font-size: 11px; font-weight: 600; color: var(--text-2); }
  .field input, .field select, .field textarea { background: var(--surface-2); border: 1px solid var(--border); color: var(--text); padding: 7px 9px; border-radius: var(--radius-sm); font-size: 12px; font-family: inherit; transition: border-color var(--transition), background var(--transition), box-shadow var(--transition); width: 100%; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px rgba(232,69,10,0.1); }
  .field input[type="file"] { padding: 5px 9px; cursor: pointer; }
  .field input[type="color"] { padding: 2px 3px; height: 34px; cursor: pointer; }
  .field textarea { resize: vertical; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  .row:last-child { margin-bottom: 0; }

  /* CHAR TAGS */
  .char-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .char-tag { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: var(--surface-2); color: var(--text-2); transition: all var(--transition); display: flex; align-items: center; gap: 4px; }
  .char-tag:hover { border-color: var(--border-mid); background: #ece9e4; }
  .char-tag.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
  .char-tag.narration { font-style: italic; }
  .char-tag-edit { font-size: 9px; opacity: 0.5; cursor: pointer; padding: 1px 3px; border-radius: 3px; transition: opacity 0.15s; line-height: 1; }
  .char-tag-edit:hover { opacity: 1; background: rgba(0,0,0,0.08); }

  /* SLOTS */
  .slot-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .slot-item { display: flex; flex-direction: column; gap: 4px; }
  .slot-label { font-size: 10px; font-weight: 700; color: var(--text-3); text-align: center; }
  .slot-item select { background: var(--surface-2); border: 1px solid var(--border); color: var(--text); padding: 6px 8px; border-radius: var(--radius-sm); font-size: 11px; font-family: inherit; width: 100%; text-align: center; cursor: pointer; transition: border-color var(--transition), box-shadow var(--transition); }
  .slot-item select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,69,10,0.1); }
  .save-btn { width: 100%; padding: 10px; font-size: 13px; font-weight: 700; background: var(--accent); color: white; border: none; border-radius: var(--radius); cursor: pointer; transition: background var(--transition), transform var(--transition); margin-top: 4px; }
  .save-btn:hover { background: var(--accent-hover); }
  .save-btn:active { transform: scale(0.98); }

  /* FITTING BOX */
  .fitting-box { background: #fffbf5; border: 1px dashed #fcd280; border-radius: var(--radius); padding: 12px 14px; margin: 12px 0 0; }
  .fitting-box .section-label { color: #b45309; margin-bottom: 8px; }
  .fitting-box small { color: #d97706; font-size: 11px; display: block; margin-top: 6px; }

  /* SLOT SIZE GRID */
  .slot-size-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 8px; }
  .slot-size-col { display: flex; flex-direction: column; gap: 4px; }
  .slot-size-col .slot-label { text-align: center; }
  .slot-size-col input { font-size: 11px; padding: 5px 7px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); width: 100%; color: var(--text); }
  .slot-size-col input:focus { outline: none; border-color: var(--accent); }

  /* SOUND BOX */
  .sound-box { background: #f0f7ff; border: 1px dashed #93c5fd; border-radius: var(--radius); padding: 12px 14px; margin: 10px 0; }
  .sound-box .section-label { color: #1d4ed8; margin-bottom: 8px; }
  .sound-btn-row { display: flex; gap: 8px; margin-bottom: 6px; }
  .sound-pick-btn { flex: 1; padding: 8px 10px; border-radius: var(--radius-sm); border: 1px dashed #93c5fd; background: #dbeafe; color: #1d4ed8; font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; transition: background 0.15s; }
  .sound-pick-btn:hover { background: #bfdbfe; }
  .sound-pick-btn.has-sound { background: #1d4ed8; color: white; border-color: #1d4ed8; border-style: solid; }
  .sound-info { font-size: 10px; color: #3b82f6; display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
  .sound-clear { cursor: pointer; color: #ef4444; font-size: 10px; padding: 1px 5px; border-radius: 3px; background: #fee2e2; border: none; font-weight: 600; }
  .sound-note { font-size: 10px; color: #60a5fa; margin-top: 4px; }

  /* PARTS */
  .parts-box { background: #f5f0ff; border: 1px dashed #c4b5fd; border-radius: var(--radius); padding: 12px 14px; margin: 8px 0 0; }
  .parts-box .section-label { color: #6d28d9; margin-bottom: 8px; }
  .slot-parts-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .slot-parts-item { display: flex; flex-direction: column; gap: 3px; }
  .slot-parts-item label { font-size: 10px; font-weight: 700; color: var(--text-3); text-align: center; }
  .slot-parts-item select { font-size: 10px; padding: 5px 6px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); width: 100%; color: var(--text); }

  /* TIMELINE */
  .timeline { flex: 1; padding: 12px 14px; overflow-y: auto; background: var(--surface-2); }
  .timeline-label { font-size: 10px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
  .scene-list { display: flex; flex-direction: column; gap: 4px; }
  .scene-card { background: var(--surface); border: 1px solid var(--border); padding: 8px 10px; border-radius: var(--radius-sm); cursor: grab; display: flex; gap: 8px; align-items: center; transition: border-color var(--transition), box-shadow var(--transition); position: relative; }
  .scene-card:hover { border-color: var(--border-mid); }
  .scene-card.active { border-color: var(--accent); background: var(--accent-bg); box-shadow: 0 0 0 2px rgba(232,69,10,0.08); }
  .scene-num { font-size: 10px; font-weight: 700; color: var(--text-3); min-width: 20px; text-align: right; }
  .scene-info { flex: 1; min-width: 0; }
  .scene-speaker { font-size: 11px; font-weight: 700; margin-bottom: 1px; }
  .scene-text { font-size: 11px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .scene-icons { font-size: 9px; color: var(--text-3); margin-top: 1px; }
  .scene-delete { background: none; border: none; color: var(--text-3); cursor: pointer; font-size: 12px; padding: 2px 4px; border-radius: 4px; flex-shrink: 0; transition: color var(--transition), background var(--transition); }
  .scene-delete:hover { color: var(--accent); background: var(--accent-bg); }
  .drag-handle { cursor: grab; color: var(--text-3); font-size: 11px; padding: 0 2px; }

  /* PREVIEW */
  #preview-container { flex: 1; display: flex; justify-content: center; align-items: center; background: var(--bg); position: relative; overflow: hidden; }
  .play-banner { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); background: rgba(26,25,23,0.9); color: white; padding: 7px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; display: none; cursor: pointer; z-index: 20; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.12); white-space: nowrap; transition: background var(--transition); letter-spacing: 0.2px; }
  .play-banner:hover { background: rgba(26,25,23,0.98); }
  #game-screen-wrapper { position: relative; transform-origin: center center; }
  #game-screen { width: 640px; height: 480px; background: #2a2826; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); border: 1px solid var(--border-mid); position: relative; overflow: hidden; background-size: cover; background-position: center; transition: background-image 0.3s ease; }
  #game-screen::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 55%; background: linear-gradient(transparent, rgba(0,0,0,0.3)); pointer-events: none; z-index: 1; }

  /* STANDING + PARTS */
  .standing-slot { position: absolute; bottom: 90px; height: 310px; transition: all 0.25s ease; display: none; transform: translateX(-50%); object-fit: contain; z-index: 2; filter: drop-shadow(0 4px 16px rgba(0,0,0,0.4)); }
  #standing-left { left: 22%; } #standing-center { left: 50%; } #standing-right { left: 78%; }
  .parts-overlay { position: absolute; pointer-events: none; z-index: 3; transform: translateX(-50%); object-fit: contain; display: none; }
  #parts-left { left: 22%; } #parts-center { left: 50%; } #parts-right { left: 78%; }

  /* ANIMATIONS */
  @keyframes jumpEffect { 0%, 100% { transform: translateX(-50%) translateY(0); } 35% { transform: translateX(-50%) translateY(-28px); } }
  @keyframes shakeEffect { 0%,100% { transform: translateX(-50%); } 20% { transform: translateX(calc(-50% - 2px)); } 40% { transform: translateX(calc(-50% + 2px)); } 60% { transform: translateX(calc(-50% - 1px)); } 80% { transform: translateX(calc(-50% + 1px)); } }
  @keyframes fadeCollapse {
  0% { transform: translateX(-50%) translateY(0); opacity:1; filter:brightness(1); }
  20% { transform: translateX(calc(-50% - 5px)); }
  40% { transform: translateX(calc(-50% + 5px)); }
  60% { transform: translateX(calc(-50% - 3px)); opacity:.95; }
  80% { transform: translateX(-50%) translateY(60px); opacity:.85; }
  100% { transform: translateX(-50%) translateY(95px); opacity:0; filter:brightness(.8) blur(2px); }}
  .effect-jump { animation: jumpEffect 0.45s ease 2; }
  .effect-shake { animation: shakeEffect 0.5s ease 2; }
  .effect-fall { animation: fadeCollapse 0.7s ease forwards; }

  /* TEXTBOX */
  #textbox { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); width: 93%; min-height: 110px; background: rgba(255,255,255,0.97); border: 1px solid rgba(255,255,255,0.8); border-radius: 10px; padding: 13px 18px 16px; display: flex; flex-direction: column; cursor: pointer; z-index: 10; backdrop-filter: blur(6px); box-shadow: 0 -2px 20px rgba(0,0,0,0.15), 0 2px 8px rgba(0,0,0,0.08); }
  #name-tag { display: flex; align-items: baseline; gap: 6px; margin-bottom: 5px; display:flex; }
  #name-main { font-size: 15px; font-weight: 800; letter-spacing: 0.2px; }
  #name-club { font-size: 13px; font-weight: 500; opacity: 0.95; }
  #text-content { font-size: 14px; line-height: 1.6; color: #1a1917; font-weight: 450; }
  #click-hint { position: absolute; bottom: 9px; right: 14px; font-size: 9px; font-weight: 700; color: rgba(0,0,0,0.3); letter-spacing: 1px; text-transform: uppercase; animation: blink 1.2s infinite; display: none; }
  @keyframes blink { 50% { opacity: 0; } }
  .text-yell { font-size: 18px !important; font-weight: 900 !important; color: #c93908 !important; letter-spacing: -0.3px; }
  .text-whisper { font-size: 12.5px !important; color: #8a8785 !important; font-style: italic; letter-spacing: 0.3px; }
  .narration-box { background: rgba(20,18,16,0.88) !important; border-color: rgba(255,255,255,0.08) !important; }
  .narration-box #name-tag { display: none !important; }
  .narration-box #text-content { color: rgba(255,255,255,0.92) !important; font-size: 14px !important; text-align: center; font-style: italic; padding-top: 12px; line-height: 1.7; }
  .narration-box #click-hint { color: rgba(255,255,255,0.25) !important; }

  /* FULLSCREEN */
  .fullscreen-active { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; z-index: 9999 !important; background: black !important; display: flex !important; justify-content: center !important; align-items: center !important; }
  .fullscreen-active #game-screen { width: 100vw !important; height: 100vh !important; border-radius: 0 !important; border: none !important; box-shadow: none !important; }
  .fullscreen-active .standing-slot { height: 62vh !important; bottom: 20vh !important; }
  .fullscreen-active .parts-overlay { height: 62vh !important; bottom: 20vh !important; }
  .fullscreen-active #textbox { bottom: 3.5vh !important; width: 82% !important; padding: 22px 32px 26px !important; }
  .fullscreen-active #name-main { font-size: 20px !important; }
  .fullscreen-active #text-content { font-size: 18px !important; }
  .fullscreen-active .narration-box #text-content { font-size: 19px !important; }

  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; } ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal-box { background: var(--surface); border-radius: var(--radius-lg); padding: 24px; width: 400px; max-width: 95vw; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; gap: 14px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .modal-actions { display: flex; gap: 8px; margin-top: 4px; }
  .btn-danger { padding: 10px 14px; font-size: 12px; font-weight: 700; background: #fee2e2; color: #dc2626; border: none; border-radius: var(--radius); cursor: pointer; transition: background 0.15s; flex-shrink: 0; }
  .btn-danger:hover { background: #fecaca; }

  /* PARTS LIST IN MODAL */
  .parts-list { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; max-height: 130px; overflow-y: auto; }
  .parts-item { display: flex; align-items: center; gap: 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; font-size: 11px; }
  .parts-item img { width: 30px; height: 30px; object-fit: contain; border-radius: 3px; background: #eee; }
  .parts-item-name { flex: 1; color: var(--text-2); }
  .parts-del { border: none; background: none; color: var(--text-3); cursor: pointer; font-size: 12px; padding: 2px 5px; border-radius: 3px; }

<script>
const SUPABASE_URL = "https://xyacthmcxeryziymouvk.supabase.co";
const SUPABASE_KEY = "sb_publishable_HsOaCpbpbopn8ErCs6aB-Q_lr4OKj1x";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let stories = {}, storyFolders = {}, characters = {};
let editingParts = [];
let currentStoryTitle = "", scenes = [];
let selectedCharId = null, selectedIndex = 0;
let isPlayMode = false, isFullPlayerMode = false, playIndex = 0, typingTimer;
let currentBgmAudio = null, currentBgmUrl = "";
let pendingBgm = null, pendingSfx = null;
let saveTimer = null; // ⭐️ 여기에 이렇게 추가해주면 끝!

/* ── SCALE FIX ── */
function fixGameScale() {
  const wrapper = document.getElementById('game-screen-wrapper');
  const container = document.getElementById('preview-container');
  if (!wrapper || !container || isFullPlayerMode) return;
  const scale = Math.min(container.clientWidth / 660, container.clientHeight / 510, 1);
  wrapper.style.transform = `scale(${scale})`;
}
new ResizeObserver(fixGameScale).observe(document.getElementById('preview-container'));

/* ── INIT ── */
window.onload = async function() {
  await loadCharactersFromSupabase();
  await loadStoriesFromSupabase();
  renderStoryGrid();
  renderCharacterTags();
  updateSlotSelectors();
  initSortable();
  const p = new URLSearchParams(window.location.search);
  const storyParam = p.get('story'), modeParam = p.get('mode');
  if (storyParam && stories[storyParam]) {
    if (modeParam === 'play') {
      document.getElementById('home-screen').style.display = 'none';
      const b = document.getElementById('play-mode-banner');
      if (b) b.style.opacity = '0';
      setTimeout(() => {
        playStoryFullscreen(storyParam);
        if (b) { b.style.opacity = '1'; b.innerHTML = '<div style="flex:1"></div>'; b.style.background = 'transparent'; b.style.boxShadow = 'none'; }
      }, 150);
    } else { setTimeout(() => playStoryFullscreen(storyParam), 150); }
  } else { document.getElementById('home-screen').style.display = 'flex'; }
};

async function loadCharactersFromSupabase() {
  const { data, error } = await client.from('characters').select('*');
  if (!error && data) {
    characters = {};
    data.forEach(c => { characters[c.id] = { name: c.name, club: c.club, color: c.color, img: c.img, customHeight: c.custom_height, customBottom: c.custom_bottom, parts: c.parts || [] }; });
  }
}

async function loadStoriesFromSupabase() {
  const { data, error } = await client.from('stories').select('*');
  if (!error && data) {
    stories = {}; storyFolders = {};
    data.forEach(s => { stories[s.title] = s.scenes; if (s.folder) storyFolders[s.title] = s.folder; });
  }
}

/* ── HOME ── */
function renderStoryGrid() {
  const root = document.getElementById('story-grid-root');
  root.innerHTML = '';
  const keys = Object.keys(stories);
  if (!keys.length) {
    root.innerHTML = `<div class="story-grid"><div class="empty-state"><span class="empty-state-icon">📖</span><h3>아직 스토리가 없어요</h3><p>첫 번째 스토리를 만들어 보세요!</p><button class="btn btn-primary" onclick="createNewStoryPrompt()" style="margin:0 auto">+ 새 스토리 만들기</button></div></div>`;
    return;
  }
  const grouped = {}; const noFolder = [];
  keys.forEach(t => { const f = storyFolders[t]; if (f) { (grouped[f] = grouped[f] || []).push(t); } else noFolder.push(t); });

  Object.keys(grouped).forEach(fn => {
    root.appendChild(makeFolderGroup(fn, grouped[fn]));
  });
  if (noFolder.length) {
    if (Object.keys(grouped).length > 0) root.appendChild(makeFolderGroup('분류 없음', noFolder, true));
    else { const g = document.createElement('div'); g.className='folder-group'; const grid=document.createElement('div'); grid.className='story-grid'; noFolder.forEach(t=>grid.appendChild(makeStoryCard(t))); g.appendChild(grid); root.appendChild(g); }
  }
}

function makeFolderGroup(folderName, titles, isDefault=false) {
  const group = document.createElement('div'); group.className = 'folder-group';
  const header = document.createElement('div'); header.className = 'folder-header';
  const toggle = document.createElement('span'); toggle.className = 'folder-toggle open'; toggle.textContent = '▶';
  const nameEl = document.createElement('span'); nameEl.className = 'folder-name'; nameEl.textContent = (isDefault?'📄 ':'📁 ') + folderName;
  const countEl = document.createElement('span'); countEl.className = 'folder-count'; countEl.textContent = titles.length;
  header.append(toggle, nameEl, countEl);
  const cards = document.createElement('div'); cards.className = 'folder-cards';
  const grid = document.createElement('div'); grid.className = 'story-grid';
  titles.forEach(t => grid.appendChild(makeStoryCard(t)));
  cards.appendChild(grid);
  header.onclick = () => { const c = cards.classList.toggle('collapsed'); toggle.classList.toggle('open', !c); };
  group.append(header, cards); return group;
}

function makeStoryCard(title) {
  const sc = stories[title], cover = sc[0]?.bg || 'https://picsum.photos/640/480?random=10';
  const card = document.createElement('div'); card.className = 'story-card';
  const st = title.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  card.innerHTML = `
    <button class="card-folder-btn" onclick="moveToFolder('${st}',event)" title="폴더 이동">📁</button>
    <button class="card-delete-btn" onclick="deleteStory('${st}',event)" title="삭제">✕</button>
    <div class="story-cover" style="background-image:url('${cover}')">
      <div class="story-cover-overlay"></div>
      <span class="story-cover-count">${sc.length}장</span>
    </div>
    <div class="story-details">
      <div class="story-title" title="${title}">${title}</div>
      <div class="story-actions">
        <button class="card-btn btn-play" onclick="playStoryFullscreen('${st}')">▶ 영화관 플레이</button>
        <button class="card-btn btn-link" onclick="copyStoryLink('${st}')">🔗 링크 복사</button>
        <button class="card-btn btn-edit" onclick="openStoryEditor('${st}')">✏️ 수정</button>
      </div>
    </div>`;
  return card;
}

async function createNewStoryPrompt() {
  const title = prompt("새 스토리 제목:");
  if (!title?.trim()) return;
  if (stories[title]) { alert("이미 같은 제목이 있어요."); return; }
  const s = [{ bg: "https://picsum.photos/640/480?random="+Math.floor(Math.random()*100), charId:"narration", name:"나레이션", text:"첫 대사를 적어보세요.", textEffect:"normal", charEffect:"none", slots:{left:"",center:"",right:""}, charScales:{left:{h:310,b:90},center:{h:310,b:90},right:{h:310,b:90}}, parts:{left:"",center:"",right:""}, bgm:null, sfx:null }];
  await client.from('stories').upsert({ title, scenes: s });
  stories[title] = s; renderStoryGrid();
}

function createFolderPrompt() {
  alert("스토리 카드의 📁 버튼으로 스토리를 원하는 폴더에 이동시키세요.\n없는 폴더 이름을 입력하면 자동으로 만들어집니다!");
}

async function moveToFolder(title, event) {
  event.stopPropagation();
  const existing = [...new Set(Object.values(storyFolders))];
  const hint = existing.length ? `\n기존 폴더: ${existing.join(', ')}\n(비워두면 폴더 없음으로 이동)` : '';
  const folder = prompt(`"${title}"을 어느 폴더에 넣을까요?${hint}`, storyFolders[title] || '');
  if (folder === null) return;
  const f = folder.trim();
  if (f) storyFolders[title] = f; else delete storyFolders[title];
  try { await client.from('stories').update({ folder: f || null }).eq('title', title); } catch(e) {}
  renderStoryGrid();
}

async function deleteStory(title, event) {
  event.stopPropagation();
  if (!confirm(`"${title}" 삭제할까요?`)) return;
  await client.from('stories').delete().eq('title', title);
  delete stories[title]; delete storyFolders[title]; renderStoryGrid();
}

function copyStoryLink(title) {
  const url = `${location.origin}${location.pathname}?story=${encodeURIComponent(title)}&mode=play`;
  navigator.clipboard.writeText(url).then(() => alert(`링크 복사 완료!`)).catch(() => prompt("복사하세요:", url));
}

function playStoryFullscreen(title) {
  currentStoryTitle = title; scenes = stories[title];
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('workspace-screen').style.display = 'flex';
  document.getElementById('preview-container').classList.add('fullscreen-active');
  document.getElementById('game-screen-wrapper').style.transform = '';
  isFullPlayerMode = true; togglePlayMode(true);
}

function goHome() {
  window.history.replaceState({}, document.title, location.pathname);
  exitPlayMode(); stopBgm(); isFullPlayerMode = false;
  document.getElementById('workspace-screen').style.display = 'none';
  document.getElementById('home-screen').style.display = 'flex';
  renderStoryGrid();

function saveCharacterProfile() {
  const name = document.getElementById('char-name').value.trim();
  const club = document.getElementById('char-club').value.trim();
  const color = document.getElementById('char-color').value;
  const fi = document.getElementById('char-file-input');
  if (!name) { alert("이름을 입력해 주세요."); return; }
  const existing = characters[name];
  const h = existing?.customHeight || 310, b = existing?.customBottom || 90, parts = existing?.parts || [];
  if (fi.files && fi.files[0]) {
    const r = new FileReader();
    r.onload = e => execReg(name, club, color, e.target.result, h, b, parts);
    r.readAsDataURL(fi.files[0]);
  } else execReg(name, club, color, existing?.img || "https://images.vrml.kro.kr/character_sample.png", h, b, parts);
}

async function execReg(id, name, club, color, img, h, b, parts) {
  const { error } = await client.from('characters').upsert({ id, name, club, color, img, parts, custom_height: h, custom_bottom: b });
  if (error) { alert("등록 실패: " + error.message); return; }
  characters[id] = { name, club, color, img, customHeight: h, customBottom: b, parts };
  renderCharacterTags(); updateSlotSelectors();
  document.getElementById('char-name').value = '';
  document.getElementById('char-club').value = '';
  document.getElementById('char-file-input').value = '';
  alert(`${club?`[${club}] `:''}${name} 등록 완료!`);
}

function updateSlotSelectors() {
  ['left','center','right'].forEach(pos => {
    const sel = document.getElementById(`slot-${pos}-select`);
    const prev = sel.value;
    sel.innerHTML = '<option value="">비어있음</option>';
    Object.keys(characters).forEach(n => { const o=document.createElement('option'); o.value=n; o.innerText=n; sel.appendChild(o); });
    sel.value = prev;
  });
}

function onSlotChange() { refreshPartsSelectors(); updatePreviewLive(); }

function refreshPartsSelectors() {
  ['l','c','r'].forEach((k, i) => {
    const pos = ['left','center','right'][i];
    const sel = document.getElementById(`parts-${k}-sel`); if (!sel) return;
    const prev = sel.value;
    sel.innerHTML = '<option value="">없음</option>';
    const charId = document.getElementById(`slot-${pos}-select`)?.value;
    if (charId && characters[charId]?.parts?.length) {
      characters[charId].parts.forEach(p => { const o=document.createElement('option'); o.value=p.id; o.innerText=p.name; sel.appendChild(o); });
    }
    sel.value = prev;
  });
}

/* ── SOUND ── */
function handleBgmFile(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => { pendingBgm = { name: f.name, data: ev.target.result }; updateSoundUI(); };
  r.readAsDataURL(f); e.target.value = '';
}
function handleSfxFile(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => { pendingSfx = { name: f.name, data: ev.target.result }; updateSoundUI(); };
  r.readAsDataURL(f); e.target.value = '';
}
function updateSoundUI() {
  const bb = document.getElementById('bgm-pick-btn'), sb = document.getElementById('sfx-pick-btn');
  const bi = document.getElementById('bgm-info'), si = document.getElementById('sfx-info');
  if (pendingBgm) { bb.classList.add('has-sound'); bb.textContent='🎵 '+pendingBgm.name.slice(0,16); bi.style.display='flex'; bi.innerHTML=`<span>${pendingBgm.name}</span><button class="sound-clear" onclick="clearBgm()">✕ 제거</button>`; }
  else { bb.classList.remove('has-sound'); bb.textContent='🎵 브금 추가'; bi.style.display='none'; }
  if (pendingSfx) { sb.classList.add('has-sound'); sb.textContent='💥 '+pendingSfx.name.slice(0,14); si.style.display='flex'; si.innerHTML=`<span>${pendingSfx.name}</span><button class="sound-clear" onclick="clearSfx()">✕ 제거</button>`; }
  else { sb.classList.remove('has-sound'); sb.textContent='💥 효과음 추가'; si.style.display='none'; }
}
function clearBgm() { pendingBgm=null; updateSoundUI(); }
function clearSfx() { pendingSfx=null; updateSoundUI(); }

function playBgm(url) {
  if (!url) return;
  if (currentBgmUrl===url && currentBgmAudio && !currentBgmAudio.paused) return;
  stopBgm();
  currentBgmAudio = new Audio(url); currentBgmAudio.loop=true; currentBgmAudio.volume=0.6;
  currentBgmAudio.play().catch(()=>{}); currentBgmUrl=url;
}
function stopBgm() { if (currentBgmAudio) { currentBgmAudio.pause(); currentBgmAudio=null; } currentBgmUrl=''; }
function playSfx(url) { if (!url) return; const a=new Audio(url); a.volume=0.8; a.play().catch(()=>{}); }

function initSortable() {
  Sortable.create(document.getElementById('scene-list'), {
    animation: 120, handle: '.drag-handle',
    onEnd: async evt => { const item=scenes.splice(evt.oldIndex,1)[0]; scenes.splice(evt.newIndex,0,item); await saveAllToStorage(); renderSceneList(); selectScene(evt.newIndex); }
  });
}

function renderSceneList() {
  const list = document.getElementById('scene-list'); list.innerHTML='';
  scenes.forEach((scene, i) => {
    const card = document.createElement('div');
    card.className = 'scene-card'+(i===selectedIndex?' active':'');
    card.onclick = () => selectScene(i);
    let color = '#9a9895';
    if (scene.charId && scene.charId!=='narration') color = characters[scene.charId]?.color||'#e8450a';
    const icons = (scene.bgm||scene.sfx?'🎵':'')+((scene.charEffect&&scene.charEffect!=='none')?'✨':'');
    card.innerHTML = `<span class="drag-handle">⠿</span><div class="scene-num">${i+1}</div><div class="scene-info"><div class="scene-speaker" style="color:${color}">${scene.name||'나레이션'}</div><div class="scene-text">${scene.text||'내용 없음'}</div>${icons?`<div class="scene-icons">${icons}</div>`:''}</div><button class="scene-delete" onclick="deleteScene(${i},event)">✕</button>`;
    list.appendChild(card);
  });
}

function selectScene(index) {
  if (isPlayMode || !scenes[index]) return;
  selectedIndex = index;
  document.querySelectorAll('.scene-card').forEach((c,i) => c.className='scene-card'+(i===index?' active':''));
  const s = scenes[index];
  document.getElementById('bg-input').value = s.bg;
  document.getElementById('text-input').value = s.text;
  document.getElementById('text-effect-input').value = s.textEffect||'normal';
  document.getElementById('char-effect-input').value = s.charEffect||'none';
  ['left','center','right'].forEach(pos => { document.getElementById(`slot-${pos}-select`).value = s.slots?.[pos]||''; });

  const cs = s.charScales||{};
  document.getElementById('sz-l-h').value = cs.left?.h??310;
  document.getElementById('sz-l-b').value = cs.left?.b??90;
  document.getElementById('sz-c-h').value = cs.center?.h??310;
  document.getElementById('sz-c-b').value = cs.center?.b??90;
  document.getElementById('sz-r-h').value = cs.right?.h??310;
  document.getElementById('sz-r-b').value = cs.right?.b??90;

  refreshPartsSelectors();
  const sp = s.parts||{};
  setTimeout(() => {
    document.getElementById('parts-l-sel').value = sp.left||'';
    document.getElementById('parts-c-sel').value = sp.center||'';
    document.getElementById('parts-r-sel').value = sp.right||'';
  }, 0);

  selectedCharId = s.charId||null;
  renderCharacterTags();
  pendingBgm = s.bgm||null; pendingSfx = s.sfx||null; updateSoundUI();
  drawScene(s, false);
}

async function addOrUpdateScene() {
  const slots = { left: document.getElementById('slot-left-select').value, center: document.getElementById('slot-center-select').value, right: document.getElementById('slot-right-select').value };
  const charScales = {
    left:   { h: parseInt(document.getElementById('sz-l-h').value)||310, b: parseInt(document.getElementById('sz-l-b').value)||90 },
    center: { h: parseInt(document.getElementById('sz-c-h').value)||310, b: parseInt(document.getElementById('sz-c-b').value)||90 },
    right:  { h: parseInt(document.getElementById('sz-r-h').value)||310, b: parseInt(document.getElementById('sz-r-b').value)||90 }
  };
  const parts = { left: document.getElementById('parts-l-sel')?.value||'', center: document.getElementById('parts-c-sel')?.value||'', right: document.getElementById('parts-r-sel')?.value||'' };
  let name = '나레이션';
  if (selectedCharId && selectedCharId!=='narration' && characters[selectedCharId]) name = characters[selectedCharId].name;
  
  const textVal = document.getElementById('text-input').value;
  const newScene = { bg: document.getElementById('bg-input').value, charId: selectedCharId, name, text: textVal, textEffect: document.getElementById('text-effect-input').value, charEffect: document.getElementById('char-effect-input').value, slots, charScales, parts, bgm: pendingBgm, sfx: pendingSfx };
  if (scenes[selectedIndex]) scenes[selectedIndex]=newScene; else scenes.push(newScene);
  if (selectedIndex===scenes.length-1) {
    scenes.push({ bg:newScene.bg, charId:selectedCharId, name, text:"다음 내용을 입력하세요.", textEffect:"normal", charEffect:"none", slots, charScales, parts:{left:'',center:'',right:''}, bgm:null, sfx:null });
    selectedIndex = scenes.length-1;
  }

  if (currentStoryTitle) {
    stories[currentStoryTitle] = scenes; 
  }

  // ⭐️ [실시간 텍스트 반영] 글자 치는 동안 화면 대사창에 실시간으로 즉시 꽂아넣기
  const textboxEl = document.getElementById('textbox');
  if (textboxEl) {
    textboxEl.textContent = textVal;
  }

  // ─── ⚡ 연속 타이핑 중에는 이전 예약된 모든 무거운 작업을 리셋 ───
  clearTimeout(saveTimer); 
  
  // ─── 💡 타이핑을 멈추고 0.4초(400ms) 뒤에 화면 연출과 서버 저장을 한 번에 실행! ───
  saveTimer = setTimeout(async () => {
    console.log("🎬 화면 동기화 및 점프 이펙트 강제 재생!");
    
    // 1. 저장 시작할 때 우측 상단 표시등 켜기
    const indicator = document.getElementById('save-status-indicator');
    const statusText = document.getElementById('save-status-text');
    if (indicator && statusText) {
      statusText.textContent = "☁️ 클라우드에 자동 저장 중...";
      indicator.style.opacity = "1";
    }

    document.querySelectorAll('.char-img').forEach(img => { img.className = 'char-img'; });
    
    setTimeout(() => {
      selectScene(selectedIndex);
      renderSceneList();
    }, 10);
    
    // 2. 수파베이스 실제 업로드 수행
    if (currentStoryTitle) {
      await client.from('stories').upsert({ title: currentStoryTitle, scenes });
    }

    // 3. 업로드가 완료되면 "저장 완료"로 바꾸고 1.5초 뒤에 스르륵 숨기기
    if (indicator && statusText) {
      statusText.textContent = "✅ 저장 완료";
      setTimeout(() => {
        if (statusText.textContent === "✅ 저장 완료") {
          indicator.style.opacity = "0";
        }
      }, 1500);
    }
  }, 400);
} // 👈 addOrUpdateScene 함수 마감

async function deleteScene(index, event) {
  event.stopPropagation();
  if (scenes.length <= 1) return;
  
  // 1. 브라우저 메모리 상에서 해당 슬라이드를 즉시 삭제!
  scenes.splice(index, 1); 
  selectedIndex = Math.max(0, index - 1);
  
  if (currentStoryTitle) { 
    stories[currentStoryTitle] = scenes; 
  }

  // ⭐️ 2. [칼삭제 핵심] 삭제된 슬라이드 '엘리먼트'만 화면에서 즉시 숨겨버림!
  const itemEl = document.querySelector(`.scene-item[data-index="${index}"]`) || 
                 document.querySelectorAll('.scene-item')[index];
  if (itemEl) {
    itemEl.style.display = 'none'; 
  }

  // 이전 예약되어 있던 타이머 취소
  clearTimeout(saveTimer); 
  
  // ⭐️ 3. 삭제 버튼 연타가 끝난 뒤(0.3초 후) 무거운 목록 갱신과 클라우드 저장을 백그라운드에서 처리!
  saveTimer = setTimeout(async () => {
    // 1. 저장 시작 표시
    const indicator = document.getElementById('save-status-indicator');
    const statusText = document.getElementById('save-status-text');
    if (indicator && statusText) {
      statusText.textContent = "🗑️ 변경사항 저장 중...";
      indicator.style.opacity = "1";
    }

    console.log("🗑️ 슬라이드 삭제 완료 및 백그라운드 클라우드 저장 중...");
    renderSceneList(); 
    selectScene(selectedIndex);
    
    if (currentStoryTitle) {
      await client.from('stories').upsert({ title: currentStoryTitle, scenes }); 
    }

    // 2. 저장 완료 표시
    if (indicator && statusText) {
      statusText.textContent = "✅ 저장 완료";
      setTimeout(() => {
        if (statusText.textContent === "✅ 저장 완료") {
          indicator.style.opacity = "0";
        }
      }, 1500);
    }
  }, 300); // 👈 타이머 마감
} // 👈 괄호가 누락되었던 deleteScene 함수 전체 마감!!

/* ── DRAW ENGINE ── */
function drawScene(scene, useTyping=false) {
  if (!scene) return;
  document.getElementById('game-screen').style.backgroundImage = `url('${scene.bg}')`;
  const box = document.getElementById('textbox');
  const nameTag = document.getElementById('name-tag');
  const nameMain = document.getElementById('name-main');
  const nameClub = document.getElementById('name-club');
  const textEl = document.getElementById('text-content');
  const isNarration = !scene.charId || scene.charId==='narration';

  if (isNarration) {
    box.classList.add('narration-box'); nameTag.style.display='none';
    ['left','center','right'].forEach(p => { document.getElementById(`standing-${p}`).style.display='none'; document.getElementById(`parts-${p}`).style.display='none'; });
  } else {
    box.classList.remove('narration-box'); nameTag.style.display='flex';
    const ac = characters[scene.charId];
    nameMain.textContent = ac ? ac.name : (scene.name||'???');
    nameMain.style.color = ac?.color||'var(--accent)';
    nameClub.textContent = ac?.club||'';
    nameClub.style.color = ac?.color||'var(--accent)';

    const scales = scene.charScales||{};
    const factor = isFullPlayerMode ? 1.8 : 1;
    const [effectPos, effectType] = (scene.charEffect||'none').split('-');

    ['left','center','right'].forEach(pos => {
      const img = document.getElementById(`standing-${pos}`);
      const pi = document.getElementById(`parts-${pos}`);
      img.className = 'standing-slot';
      const charName = scene.slots?.[pos];
      const cd = characters[charName];
      const sc2 = scales[pos]||{};
      const h = ((sc2.h||cd?.customHeight||310)*factor);
      const b = ((sc2.b??cd?.customBottom??90)*factor);

      if (cd?.img) {
        img.src=cd.img; img.style.display='block'; img.style.height=`${h}px`; img.style.bottom=`${b}px`;
        // parts overlay — same size as character
        const partId = scene.parts?.[pos];
        const partObj = partId && cd.parts?.find(p=>p.id===partId);
        if (partObj && pi) { pi.src=partObj.img; pi.style.display='block'; pi.style.height=`${h}px`; pi.style.bottom=`${b}px`; }
        else if (pi) pi.style.display='none';
        // motion
        if (effectPos===pos && effectType) {
          void img.offsetWidth;
          if (effectType==='jump') img.classList.add('effect-jump');
          else if (effectType==='shake') img.classList.add('effect-shake');
          else if (effectType==='fall') img.classList.add('effect-fall');
        }
      } else {
        img.style.display='none'; if (pi) pi.style.display='none';
      }
    });
  }

  textEl.className='';
  if (scene.textEffect==='yell') textEl.classList.add('text-yell');
  if (scene.textEffect==='whisper') textEl.classList.add('text-whisper');
  if (useTyping && scene.textEffect!=='yell') typeWriter(textEl, scene.text);
  else { clearInterval(typingTimer); textEl.innerText=scene.text; }
}

function typeWriter(el, text, speed=22) {
  el.innerHTML=''; let i=0; clearInterval(typingTimer);
  typingTimer = setInterval(()=>{ if (i<text.length){el.innerHTML+=text.charAt(i);i++;}else clearInterval(typingTimer); }, speed);
}

/* ── PLAY MODE ── */
function togglePlayMode(fromHome=false) {
  if (!scenes.length) return;
  isPlayMode=true; playIndex=0;
  document.getElementById('play-mode-banner').style.display='flex';
  document.getElementById('click-hint').style.display='block';
  if (!fromHome) document.getElementById('left-panel').style.opacity='0.08';
  document.getElementById('game-screen-wrapper').style.transform='';
  const s = scenes[0]; drawScene(s, true);
  if (s.bgm?.data) playBgm(s.bgm.data);
  if (s.sfx?.data) playSfx(s.sfx.data);
}

function exitPlayMode() {
  isPlayMode=false; clearInterval(typingTimer); stopBgm();
  document.getElementById('play-mode-banner').style.display='none';
  document.getElementById('click-hint').style.display='none';
  document.getElementById('left-panel').style.opacity='1';
  if (isFullPlayerMode) {
    document.getElementById('preview-container').classList.remove('fullscreen-active');
    isFullPlayerMode=false; goHome();
  } else { selectScene(selectedIndex); setTimeout(fixGameScale, 60); }
}

function handleScreenClick() {
  const modeParam = new URLSearchParams(location.search).get('mode');
  if (!isPlayMode) return;
  playIndex++;
  if (playIndex < scenes.length) {
    const s = scenes[playIndex]; drawScene(s, true);
    if (s.bgm?.data) playBgm(s.bgm.data);
    if (s.sfx?.data) playSfx(s.sfx.data);
  } else {
    if (modeParam==='play') {
      clearInterval(typingTimer); stopBgm();
      document.getElementById('textbox').style.display='none';
      document.getElementById('name-tag').style.display='none';
      document.getElementById('click-hint').style.display='none';
      ['left','center','right'].forEach(p=>{ document.getElementById(`standing-${p}`).style.display='none'; document.getElementById(`parts-${p}`).style.display='none'; });
      document.getElementById('game-screen').style.backgroundImage='none';
      document.getElementById('game-screen').style.backgroundColor='#0b0b0b';
      const banner = document.getElementById('play-mode-banner');
      Object.assign(banner.style, {display:'flex',justifyContent:'center',alignItems:'center',position:'fixed',top:'0',left:'0',width:'100vw',height:'100vh',backgroundColor:'#0b0b0b',zIndex:'999999'});
      banner.className=''; banner.onclick=e=>e.stopPropagation();
      banner.innerHTML=`<div style="text-align:center;color:#fff;font-family:sans-serif" onclick="event.stopPropagation()"><h2 style="margin-bottom:24px;font-size:24px">🎬 플레이가 완료되었습니다.</h2><button onclick="event.stopPropagation();location.reload()" style="padding:14px 28px;font-size:18px;font-weight:bold;color:#fff;background:#e8450a;border:none;border-radius:8px;cursor:pointer">🔄 처음부터 다시 재생하기</button></div>`;
      isPlayMode=false;
    } else { stopBgm(); alert('🎬 스토리가 끝났습니다!'); exitPlayMode(); }
  }
}

/* ── JSON IMPORT ── */
async function importJSONBackup(event) {
  const file = event.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = async e => {
    try {
      const d = JSON.parse(e.target.result);
      if (!confirm("클라우드에 업로드하시겠습니까?")) return;
      const ts = d.stories||d;
      for (const t in ts) if (Array.isArray(ts[t])) { await client.from('stories').upsert({title:t,scenes:ts[t]}); stories[t]=ts[t]; }
      if (d.characters) for (const id in d.characters) { const c=d.characters[id]; await client.from('characters').upsert({id,name:c.name,club:c.club||'',color:c.color||'#e8450a',img:c.img,parts:c.parts||[],custom_height:c.customHeight||310,custom_bottom:c.customBottom||90}); characters[id]=c; }
      alert("🎉 업로드 완료!"); renderStoryGrid(); renderCharacterTags(); updateSlotSelectors();
    } catch(err) { alert("파일 오류: "+err.message); }
  };
  r.readAsText(file); event.target.value='';
}
</script>
